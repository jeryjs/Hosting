name: run Scrape_Score-and-Synopsis.py

on:
  schedule:
    - cron: '0 9 * * 3' # At 09:00 on Every Wednesday
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      MAL_APP_CLIENTID: ${{ secrets.MAL_APP_CLIENTID }}
      OXYLABS_PROXY_USER: ${{ secrets.OXYLABS_PROXY_USER }}
      OXYLABS_PROXY_PASS: ${{ secrets.OXYLABS_PROXY_PASS }}
      OXYLABS_PROXY_HOST: dc.oxylabs.io
      OXYLABS_PROXY_PORTS: 8001,8002,8003,8004,8005
      MAL_REQUEST_INTERVAL_SECONDS: 1
      MAL_INFO_REFRESH_DAYS: 28
      MAL_MAX_WORKERS: 5
    steps:

      - name: checkout repo content
        uses: actions/checkout@v2 # checkout the repository content to github runner

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # install the python version needed
          
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: execute py script # run scrape.py
        run: python Scrape_Score-and-Synopsis.py
          
      - name: commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || (git commit -a -m "[MAL List Scraper] Refreshed data from MAL")
          
      - name: push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main 
